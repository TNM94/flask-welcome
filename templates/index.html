<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boas-vindas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card h1 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 8px;
    }

    .card p.subtitle {
      color: #888;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.88; }

    .mensagem {
      margin-top: 28px;
      padding: 20px;
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      border-radius: 8px;
      color: #444;
      font-size: 1.1rem;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 Boas-vindas</h1>
    <p class="subtitle">Digite seu nome para continuar</p>

    <form method="POST">
      <input
        type="text"
        name="nome"
        placeholder="Seu nome aqui..."
        value="{{ nome or '' }}"
        autofocus
        required
      />
      <button type="submit">Entrar</button>
    </form>

    {% if nome %}
    <div class="mensagem">
      Olá, <strong>{{ nome }}</strong>! Seja muito bem-vindo(a)! 🎉
    </div>
    {% endif %}
  </div>
</body>
</html>
